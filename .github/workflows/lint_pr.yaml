name: Lint

on:
  pull_request:

jobs:
  forbid-null-resource:
    runs-on: ubuntu-latest
    name: Forbid null_resource usage
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for null provider resources
        run: |
          if grep -RInE 'resource[[:space:]]+"null_resource"|provider[[:space:]]+"null"|hashicorp/null' --include='*.tf' --include='*.tf.json' .; then
            echo "::error::Use terraform_data instead of null_resource/hashicorp/null. Moved blocks from old null_resource addresses are allowed for state migration."
            exit 1
          fi

  tfsec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    name: Scan terraform files with tfsec
    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Run tfsec with reviewdog output on the PR
        uses: reviewdog/action-tfsec@v1.30.0
        with:
          github_token: ${{ github.token }}
          filter_mode: nofilter
          fail_on_error: true
          tfsec_flags: --ignore-hcl-errors

  validate:
    runs-on: ubuntu-latest
    name: Validate Terraform ${{ matrix.terraform-version }}
    strategy:
      fail-fast: false
      matrix:
        terraform-version:
          - 1.10.5
          - 1.14.9
          - 1.15.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform-version }}

      - name: terraform init and validate
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

  opentofu-validate:
    runs-on: ubuntu-latest
    name: Validate OpenTofu compatibility
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: tofu init and validate
        run: |
          tofu init -backend=false -input=false
          tofu validate -no-color

  fmt-check:
    runs-on: ubuntu-latest
    name: Check formatting of terraform files
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: terraform fmt
        uses: dflook/terraform-fmt-check@v2.2.3
