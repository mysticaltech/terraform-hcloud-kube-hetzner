name: Test in Hetzner

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hetzner-test-${{ github.event.pull_request.number || github.ref }}
  # Queue newer runs instead of cancelling in-flight ones: a cancelled job skips
  # its destroy step and orphans a full test cluster (seen live repeatedly).
  cancel-in-progress: false

env:
  HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  HCLOUD_CONTEXT: ${{ secrets.HCLOUD_CONTEXT }}
  SNAPSHOT_ID_ARM: ${{ secrets.SNAPSHOT_ID_ARM }}
  SNAPSHOT_ID_X86: ${{ secrets.SNAPSHOT_ID_X86 }}
  LEAPMICRO_SNAPSHOT_ID_ARM: ${{ secrets.LEAPMICRO_SNAPSHOT_ID_ARM }}
  LEAPMICRO_SNAPSHOT_ID_X86: ${{ secrets.LEAPMICRO_SNAPSHOT_ID_X86 }}
  LEAPMICRO_SNAPSHOT_ID_ARM_RKE2: ${{ secrets.LEAPMICRO_SNAPSHOT_ID_ARM_RKE2 }}
  LEAPMICRO_SNAPSHOT_ID_X86_RKE2: ${{ secrets.LEAPMICRO_SNAPSHOT_ID_X86_RKE2 }}
  EXPECTED_NODE_OS: leapmicro
  TF_VAR_microos_arm_snapshot_id: ${{ secrets.SNAPSHOT_ID_ARM }}
  TF_VAR_microos_x86_snapshot_id: ${{ secrets.SNAPSHOT_ID_X86 }}

jobs:
  tests:
    name: Run Hetzner Tests (${{ matrix.engine }}, ${{ matrix.preset }})
    runs-on: ubuntu-latest
    environment: hetzner-test
    if: ${{ vars.TEST_IN_HETZNER == '1' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    strategy:
      fail-fast: false
      # Cap concurrent clusters: 6 parallel test clusters exhaust the CI project's
      # server and load-balancer quotas (seen live: resource_limit_exceeded + LB IP
      # wait timeouts). 2 clusters x ~4 servers stays comfortably inside limits.
      max-parallel: 2
      matrix:
        engine: [terraform, tofu]
        preset: [default, nginx_ingress, rke2]

    steps:
      - name: Add env mask
        run: |
          for secret_value in \
            "$HCLOUD_TOKEN" \
            "$HCLOUD_CONTEXT" \
            "$SNAPSHOT_ID_ARM" \
            "$SNAPSHOT_ID_X86" \
            "$LEAPMICRO_SNAPSHOT_ID_ARM" \
            "$LEAPMICRO_SNAPSHOT_ID_X86" \
            "$LEAPMICRO_SNAPSHOT_ID_ARM_RKE2" \
            "$LEAPMICRO_SNAPSHOT_ID_X86_RKE2"; do
            if [ -n "$secret_value" ]; then
              echo "::add-mask::$secret_value"
            fi
          done

      - name: Check prerequisites
        id: prerequisites
        run: |
          PRESET_NAME="${{ matrix.preset }}"
          case "$PRESET_NAME" in
            rke2)
              leapmicro_arm_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_ARM_RKE2"
              leapmicro_x86_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_X86_RKE2"
              required_names="LEAPMICRO_SNAPSHOT_ID_ARM_RKE2 and LEAPMICRO_SNAPSHOT_ID_X86_RKE2"
              ;;
            *)
              leapmicro_arm_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_ARM"
              leapmicro_x86_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_X86"
              required_names="LEAPMICRO_SNAPSHOT_ID_ARM and LEAPMICRO_SNAPSHOT_ID_X86"
              ;;
          esac

          if [ -z "$leapmicro_arm_snapshot_id" ] || [ -z "$leapmicro_x86_snapshot_id" ]; then
            echo "::error::Leap Micro CI preset ${PRESET_NAME} requires ${required_names}. Refusing to fall back to MicroOS snapshots because that would make coverage reporting dishonest."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Select Leap Micro snapshots
        if: steps.prerequisites.outputs.enabled == 'true'
        run: |
          PRESET_NAME="${{ matrix.preset }}"
          case "$PRESET_NAME" in
            rke2)
              leapmicro_arm_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_ARM_RKE2"
              leapmicro_x86_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_X86_RKE2"
              ;;
            *)
              leapmicro_arm_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_ARM"
              leapmicro_x86_snapshot_id="$LEAPMICRO_SNAPSHOT_ID_X86"
              ;;
          esac

          {
            echo "TF_VAR_leapmicro_arm_snapshot_id=${leapmicro_arm_snapshot_id}"
            echo "TF_VAR_leapmicro_x86_snapshot_id=${leapmicro_x86_snapshot_id}"
          } >> "$GITHUB_ENV"

      - name: Checkout
        if: steps.prerequisites.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Install Terraform
        if: steps.prerequisites.outputs.enabled == 'true' && matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@v3

      - name: Install OpenTofu
        if: steps.prerequisites.outputs.enabled == 'true' && matrix.engine == 'tofu'
        uses: opentofu/setup-opentofu@v1

      - name: Install kubectl
        if: steps.prerequisites.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4

      - name: Create SSH keys
        if: steps.prerequisites.outputs.enabled == 'true'
        run: ssh-keygen -f ~/.ssh/id_ed25519 -N ""

      - name: Apply preset
        if: steps.prerequisites.outputs.enabled == 'true'
        timeout-minutes: 20
        run: |
          IAC_BIN="${{ matrix.engine }}"
          PRESET_NAME="${{ matrix.preset }}"
          PRESET_SLUG="${PRESET_NAME//_/-}"
          PRESET_SLUG="$(printf '%s' "$PRESET_SLUG" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          # Hetzner hostnames are max 63 chars; cluster_name must leave >=24 chars for "-<pool>-<suffix>".
          TEST_CLUSTER_NAME="kh-ci-${IAC_BIN:0:2}-${PRESET_SLUG:0:4}-${GITHUB_RUN_ID: -6}${GITHUB_RUN_ATTEMPT}"
          TEST_DIR="${RUNNER_TEMP}/kube-hetzner-${IAC_BIN}-${PRESET_NAME}"
          echo "TEST_CLUSTER_NAME=${TEST_CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "TEST_DIR=${TEST_DIR}" >> "$GITHUB_ENV"
          rm -rf "${TEST_DIR}"
          mkdir -p "${TEST_DIR}"
          cp tests/ci-kube.tf "${TEST_DIR}/kube.tf"
          cp "tests/presets/${{ matrix.preset }}.tfvars" "${TEST_DIR}/tests.auto.tfvars"
          perl -0pi -e "s#source\\s*=\\s*\"kube-hetzner/kube-hetzner/hcloud\"#source = \"${GITHUB_WORKSPACE}\"#" "${TEST_DIR}/kube.tf"
          "${IAC_BIN}" -chdir="${TEST_DIR}" init
          "${IAC_BIN}" -chdir="${TEST_DIR}" validate
          "${IAC_BIN}" -chdir="${TEST_DIR}" apply -auto-approve -var="cluster_name=${TEST_CLUSTER_NAME}"

      - name: Basic cluster health
        if: steps.prerequisites.outputs.enabled == 'true'
        timeout-minutes: 5
        run: |
          KUBECONFIG_FILE="${TEST_CLUSTER_NAME}_kubeconfig.yaml"
          test -f "${TEST_DIR}/${KUBECONFIG_FILE}"
          kubectl --kubeconfig "${TEST_DIR}/${KUBECONFIG_FILE}" get nodes -o wide
          kubectl --kubeconfig "${TEST_DIR}/${KUBECONFIG_FILE}" get pods -A

      - name: Assert node OS labels
        if: steps.prerequisites.outputs.enabled == 'true'
        timeout-minutes: 2
        run: |
          KUBECONFIG_FILE="${TEST_CLUSTER_NAME}_kubeconfig.yaml"
          case "${EXPECTED_NODE_OS}" in
            leapmicro)
              expected_os_image_substring="Leap Micro"
              ;;
            microos)
              expected_os_image_substring="MicroOS"
              ;;
            *)
              echo "::error::Unsupported EXPECTED_NODE_OS=${EXPECTED_NODE_OS}; expected leapmicro or microos"
              exit 1
              ;;
          esac

          node_os_images="$(
            kubectl --kubeconfig "${TEST_DIR}/${KUBECONFIG_FILE}" get nodes -o json |
              jq -r '.items[] | [.metadata.name, (.status.nodeInfo.osImage // "<missing>")] | @tsv'
          )"

          echo "$node_os_images"

          mismatches="$(printf '%s\n' "$node_os_images" | awk -F '\t' -v expected="${expected_os_image_substring}" 'index($2, expected) == 0 {print}')"
          if [ -n "$mismatches" ]; then
            echo "::error::Expected every node osImage to contain ${expected_os_image_substring}; mismatches:"
            printf '%s\n' "$mismatches"
            exit 1
          fi

      - name: Destroy cluster
        if: steps.prerequisites.outputs.enabled == 'true' && always()
        run: |
          if [ -z "${TEST_DIR:-}" ] || [ ! -d "${TEST_DIR}" ] || [ -z "${TEST_CLUSTER_NAME:-}" ]; then
            echo "No initialized test directory was created; skipping destroy."
            exit 0
          fi

          ${{ matrix.engine }} -chdir="${TEST_DIR}" destroy -auto-approve -var="cluster_name=${TEST_CLUSTER_NAME}"
